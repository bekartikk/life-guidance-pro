services:
  - type: web
    name: life-guidance-pro-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CLIENT_ORIGIN
        value: https://your-vercel-site.vercel.app
      - key: GEMINI_API_KEY
        sync: false
